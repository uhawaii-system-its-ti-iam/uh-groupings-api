services:
  # AWS CLI for infrastructure operations
  aws-cli:
    build:
      context: .
      dockerfile: Dockerfile.aws-cli
    container_name: uh-groupings-aws-cli
    stdin_open: true
    tty: true
    volumes:
      # Mount the host repo so the docker CLI inside this container can read
      # the build context. The CLI tars the context up and ships it to the
      # host daemon over the socket, so the path only needs to make sense
      # inside the container.
      - ../:/workspace
      # Bind-mount the host docker socket so the docker CLI inside the
      # container sends commands to the host daemon (no docker-in-docker).
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount the developer's overrides file (read-only) so setup.sh can
      # read application secrets from it. Path inside the container matches the
      # `dockerhost` Spring profile's `spring.config.import` location.
      - ${HOME}/.${USER}-conf/uh-groupings-api-overrides.properties:/overrides/uh-groupings-api-overrides.properties:ro
    env_file:
      - .env
    environment:
      # AWS credentials are injected by aws-vault — see aws/README.md.
      # Listing the names without values means "pass through from the calling shell".
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    working_dir: /workspace/aws
    entrypoint: /bin/bash
    profiles:
      - tools

networks:
  default:
    name: uh-groupings-aws-tools
