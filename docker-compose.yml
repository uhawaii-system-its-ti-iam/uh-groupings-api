version: '3.8'

services:
  uh-groupings-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uh-groupings-api
    ports:
      - "8080:8080"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=localhost
      # JVM Options
      - JAVA_OPTS=-Xmx1g -Xms512m
    env_file:
      # This file is generated by docker/dev-overrides-properties.sh
      # Run: ./docker/dev-overrides-properties.sh
      # See docker/README.md for details
      - docker/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - groupings-network

networks:
  groupings-network:
    driver: bridge
